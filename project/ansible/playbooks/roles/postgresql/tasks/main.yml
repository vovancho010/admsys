---
# tasks/main.yml - Основные задачи установки PostgreSQL

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: ['packages']

- name: Install PostgreSQL packages
  apt:
    name: "{{ postgresql_packages }}"
    state: present
  tags: ['packages']

- name: Ensure PostgreSQL is running
  systemd:
    name: postgresql
    state: started
    enabled: yes
  tags: ['service']

- name: Configure postgresql.conf (listen addresses)
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: restart postgresql
  tags: ['configure']

- name: Configure postgresql.conf (port)
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
    regexp: "^#?port"
    line: "port = {{ postgresql_port }}"
  notify: restart postgresql
  tags: ['configure']

- name: Copy pg_hba.conf (client authentication)
  template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: 0640
  notify: restart postgresql
  tags: ['configure']

- name: Create application database
  postgresql_db:
    name: "{{ postgresql_database }}"
    state: present
  become_user: postgres
  tags: ['database']

- name: Create application user
  postgresql_user:
    name: "{{ postgresql_user }}"
    password: "{{ postgresql_password }}"
    db: "{{ postgresql_database }}"
    priv: "ALL"
    state: present
  become_user: postgres
  tags: ['database']
