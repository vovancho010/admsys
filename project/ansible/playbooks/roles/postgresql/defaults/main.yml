---
# defaults/main.yml - Настройки по умолчанию для PostgreSQL

# Пакеты для установки
postgresql_packages:
  - postgresql
  - postgresql-contrib
  - libpq-dev
  - python3-psycopg2  # Для работы модуля postgresql в Ansible

# Конфигурационные параметры PostgreSQL
postgresql_config:
  max_connections: "100"
  shared_buffers: "128MB"
  effective_cache_size: "512MB"
  maintenance_work_mem: "64MB"