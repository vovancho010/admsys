---
# tasks/main.yml - Установка и настройка веб-сервера

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: ['packages']

- name: Install web server packages
  apt:
    name: "{{ packages }}"
    state: present
  tags: ['packages']

- name: Create document root directory
  file:
    path: "{{ document_root }}"
    state: directory
    owner: "{{ web_user }}"
    group: "{{ web_group }}"
    mode: 0755
  tags: ['configure']

- name: Copy test index page
  template:
    src: index.html.j2
    dest: "{{ document_root }}/index.html"
    owner: "{{ web_user }}"
    group: "{{ web_group }}"
    mode: 0644
  tags: ['configure']

- name: Copy PHP info page
  template:
    src: info.php.j2
    dest: "{{ document_root }}/info.php"
    owner: "{{ web_user }}"
    group: "{{ web_group }}"
    mode: 0644
  tags: ['configure']

- name: Configure Nginx virtual host (if Nginx selected)
  template:
    src: nginx_vhost.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: 0644
  notify: restart web server
  when: web_server == "nginx"
  tags: ['configure']

- name: Configure Apache virtual host (if Apache selected)
  template:
    src: apache_vhost.conf.j2
    dest: /etc/apache2/sites-available/000-default.conf
    owner: root
    group: root
    mode: 0644
  notify: restart web server
  when: web_server == "apache2"
  tags: ['configure']

- name: Ensure web server is enabled and running
  systemd:
    name: "{{ web_server }}"
    state: started
    enabled: yes
  tags: ['service']

- name: Ensure PHP-FPM is running (for Nginx)
  systemd:
    name: "php{{ php_version }}-fpm"
    state: started
    enabled: yes
  when: web_server == "nginx"
  tags: ['service']

- name: Test web server response
  uri:
    url: "http://localhost/"
    return_content: yes
  register: web_test
  changed_when: false
  tags: ['test']

- name: Display web server test result
  debug:
    msg: "Web server response: {{ web_test.content | truncate(100) }}"
  when: web_test.status == 200
  tags: ['test']