---
# defaults/main.yml - Настройки по умолчанию

nginx_version: latest # Версия Nginx (latest = последняя стабильная)
worker_connections: 100 # Максимальное количество одновременных соединений

# Таймауты
proxy_connect_timeout: 60s
proxy_send_timeout: 60s
proxy_read_timeout: 60s

# Размер буфера для прокси
proxy_buffer_size: 4k
proxy_buffers: 8 4k
