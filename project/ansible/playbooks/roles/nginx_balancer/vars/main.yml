---
# vars/main.yml - Переменные для Nginx балансировщика

# Список веб-серверов для балансировки
# Эти IP должны соответствовать вашим веб-серверам из Vagrantfile
web_servers:
  - "192.168.56.11"   # web1
  - "192.168.56.12"   # web2

web_server_port: 80  # Порт, на котором слушают веб-серверы
balancer_listen_port: 80  # Порт, который слушает балансировщик

# Метод балансировки
# Возможные значения:
#   round_robin  - по кругу (по умолчанию)
#   least_conn   - на сервер с наименьшим числом активных соединений
#   ip_hash      - привязка к IP клиента (сессии)
load_balancing_method: "round_robin"

# Имя сервера (для заголовка Host)
server_name: "localhost"
