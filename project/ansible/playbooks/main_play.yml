---

- hosts: all
  become: true
  gather_facts: false
  tags: ['always']
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

# Шаг 1: База данных
- import_playbook: database.yml

# Шаг 2: Веб-серверы
- import_playbook: webserver.yml

# Шаг 3: Балансировщик
- import_playbook: loadbalancer.yml