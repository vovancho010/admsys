# ============================================
# Глобальные настройки для всех серверов
# ============================================
[all:vars]
ansible_user = vagrant
ansible_ssh_private_key_file = ./key/id_1
ansible_ssh_common_args = -o StrictHostKeyChecking=no
ansible_python_interpreter = /usr/bin/python3

# ============================================
# Группа: База данных
# ============================================
[database]
database ansible_host=192.168.3.13

# ============================================
# Группа: Веб-серверы
# ============================================
[webservers]
web1 ansible_host=192.168.3.11
web2 ansible_host=192.168.3.12

# ============================================
# Группа: Балансировщик
# ============================================
[loadbalancer]
balancer ansible_host=192.168.3.10

# ============================================
# Сборная группа: Все серверы приложения
# ============================================
[app_servers:children]
database
webservers
loadbalancer